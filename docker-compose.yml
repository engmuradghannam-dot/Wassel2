version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: murad-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: murad_erp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-murad_erp_secure_2026}
      POSTGRES_DB: murad_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U murad_erp -d murad_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - murad-erp-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: murad-erp-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - murad-erp-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: murad-erp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://murad_erp:${DB_PASSWORD:-murad_erp_secure_2026}@postgres:5432/murad_erp?schema=public
      JWT_SECRET: ${JWT_SECRET:-murad-erp-super-secret-key-2026-change-me}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - murad-erp-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: murad-erp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - murad-erp-network

  # Nginx (Production)
  nginx:
    image: nginx:alpine
    container_name: murad-erp-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/nginx-ssl.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - murad-erp-network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  murad-erp-network:
    driver: bridge
